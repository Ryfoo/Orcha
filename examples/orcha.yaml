tasks:
  read-article:
    type: file
    operation: read
    path: "{{$input}}"
    output_type: text

  summarize:
    type: ai
    provider: openai
    model: gpt-4o-mini
    system: "You are a concise summarizer."
    prompt: "Summarize the following article in short bullet points:\n\n{{$input}}"
    output_type: text

  translate:
    type: ai
    provider: openai
    model: gpt-4o-mini
    system: "You are a professional translator."
    prompt: "Translate the following text to French. Return only the translation:\n\n{{$input}}"
    output_type: text

  save:
    type: file
    operation: write
    path: "./examples/output/result.txt"
    content: "{{$input}}"
    output_type: filepath

pipelines:
  summarize-article:
    description: "Read an article, summarize it, save the summary."
    steps:
      - task: read-article
      - task: summarize
      - task: save

  summarize-and-translate:
    description: "Read an article, summarize it, translate to French, save."
    steps:
      - task: read-article
      - task: summarize
      - task: translate
      - task: save
